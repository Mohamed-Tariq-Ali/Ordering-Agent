<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrderBot — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --surface2:  #1a1e28;
      --border:    #242835;
      --accent:    #7c6aff;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    14px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: grid;
      place-items: center;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      z-index: 0;
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 0 0 1px rgba(124,106,255,0.08),
                  0 32px 64px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent2); }

    /* Tab switcher */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }

    .tab {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      color: var(--muted);
      transition: all 0.2s;
      user-select: none;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(124,106,255,0.4);
    }

    /* Form */
    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    input::placeholder { color: var(--muted); }

    button[type="submit"] {
      margin-top: 4px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]:hover { opacity: 0.92; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }

    button[type="submit"].loading {
      pointer-events: none;
      opacity: 0.7;
    }

    button[type="submit"].loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 1s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Alert */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      animation: fadeIn 0.25s ease;
    }

    .alert.error {
      display: block;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--red);
    }

    .alert.success {
      display: block;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.25);
      color: var(--green);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      margin: 4px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .hint span {
      color: var(--accent2);
      cursor: pointer;
      font-weight: 500;
    }

    .hint span:hover { text-decoration: underline; }

    /* Password strength */
    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">Order<span>Bot</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Create Account</div>
  </div>

  <div id="alert" class="alert"></div>

  <!-- LOGIN FORM -->
  <form class="form active" id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="your username" autocomplete="username" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
    </div>
    <button type="submit" id="login-btn">Sign In →</button>
    <p class="hint">No account? <span onclick="switchTab('signup')">Create one free</span></p>
  </form>

  <!-- SIGNUP FORM -->
  <form class="form" id="signup-form" onsubmit="handleSignup(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="signup-username" placeholder="choose a username" autocomplete="username" required />
    </div>
    <div class="field">
      <label>Email <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="min 6 characters"
             autocomplete="new-password" oninput="checkStrength(this.value)" required />
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>
    <button type="submit" id="signup-btn">Create Account →</button>
    <p class="hint">Already have one? <span onclick="switchTab('login')">Sign in</span></p>
  </form>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('login-form').classList.toggle('active', tab === 'login');
    document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
    clearAlert();
  }

  function showAlert(msg, type='error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type}`;
  }

  function clearAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
    el.textContent = '';
  }

  function setLoading(btnId, on) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('loading', on);
    btn.textContent = on ? 'Please wait...' : (btnId === 'login-btn' ? 'Sign In →' : 'Create Account →');
  }

  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct   = (score / 5) * 100;
    const color = score <= 1 ? '#f87171' : score <= 3 ? '#fbbf24' : '#34d399';
    fill.style.width      = pct + '%';
    fill.style.background = color;
  }

  async function handleLogin(e) {
    e.preventDefault();
    clearAlert();
    setLoading('login-btn', true);
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('login-username').value.trim(),
          password: document.getElementById('login-password').value,
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed.');
      showAlert('✓ ' + data.message, 'success');
      setTimeout(() => window.location.href = '/', 800);
    } catch(err) {
      showAlert('✗ ' + err.message);
      setLoading('login-btn', false);
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    clearAlert();
    setLoading('signup-btn', true);
    const pw = document.getElementById('signup-password').value;
    if (pw.length < 6) {
      showAlert('✗ Password must be at least 6 characters.');
      setLoading('signup-btn', false);
      return;
    }
    try {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('signup-username').value.trim(),
          email:    document.getElementById('signup-email').value.trim(),
          password: pw,
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Signup failed.');
      showAlert('✓ Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/', 900);
    } catch(err) {
      showAlert('✗ ' + err.message);
      setLoading('signup-btn', false);
    }
  }
</script>
</body>
</html>
